services:
  # =========================================================================
  # Infrastructure
  # =========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: video-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: video_embedding
      TZ: Asia/Shanghai
    volumes:
      - video_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: video-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - video_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: video-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - video_minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Gorse Recommendation Engine
  # =========================================================================
  gorse_master:
    image: zhenghaoz/gorse-master:v0.5.10
    container_name: video-gorse-master
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./gorse/config.toml:/etc/gorse/config.toml:ro
      - video_gorse_master_data:/var/lib/gorse/master
      - video_gorse_blob_data:/var/lib/gorse/blob
      - video_gorse_log:/var/log/gorse
    ports:
      - "${GORSE_MASTER_GRPC_PORT:-8086}:8086"
      - "${GORSE_DASHBOARD_PORT:-8088}:8088"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/"]
      interval: 10s
      timeout: 5s
      retries: 3

  gorse_server:
    image: zhenghaoz/gorse-server:v0.5.10
    container_name: video-gorse-server
    command:
      - "--master-host"
      - "gorse_master"
      - "--master-port"
      - "8086"
      - "--http-host"
      - "0.0.0.0"
      - "--http-port"
      - "8087"
      - "--log-path"
      - "/var/log/gorse/server.log"
      - "--cache-path"
      - "/var/lib/gorse/server_cache.data"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - video_gorse_server_data:/var/lib/gorse
      - video_gorse_log:/var/log/gorse
    ports:
      - "${GORSE_SERVER_PORT:-8087}:8087"
    restart: unless-stopped
    depends_on:
      - gorse_master

  gorse_worker:
    image: zhenghaoz/gorse-worker:v0.5.10
    container_name: video-gorse-worker
    command:
      - "--master-host"
      - "gorse_master"
      - "--master-port"
      - "8086"
      - "--http-host"
      - "0.0.0.0"
      - "--http-port"
      - "8089"
      - "--log-path"
      - "/var/log/gorse/worker.log"
      - "--cache-path"
      - "/var/lib/gorse/worker_cache.data"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - video_gorse_worker_data:/var/lib/gorse
      - video_gorse_log:/var/log/gorse
    ports:
      - "${GORSE_WORKER_PORT:-8089}:8089"
    restart: unless-stopped
    depends_on:
      - gorse_master

  # =========================================================================
  # Application
  # =========================================================================
  backend:
    image: golang:1.26.1-bookworm
    container_name: video-backend
    working_dir: ${VIDEO_PROJECT_ROOT:-/repo}/video-service
    volumes:
      - ${VIDEO_PROJECT_ROOT:-.}:${VIDEO_PROJECT_ROOT:-/repo}
      - /tmp/video-embedding:/tmp/video-embedding
      - video_gomodcache:/go/pkg/mod
      - video_gobuildcache:/root/.cache/go-build
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/bin/containerd:/usr/bin/containerd:ro
    environment:
      TZ: Asia/Shanghai
      GOPROXY: https://goproxy.cn,direct
      CONFIG_FILE: ${VIDEO_PROJECT_ROOT:-/repo}/video-service/configs/video_prod.yml
      HTTP_ADDR: "0.0.0.0:8083"
    ports:
      - "${VIDEO_HTTP_PORT:-8083}:8083"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      - "bash"
      - "-c"
      - |
        set -eux

        chmod 666 /var/run/docker.sock

        docker image inspect jrottenberg/ffmpeg >/dev/null 2>&1 || docker pull jrottenberg/ffmpeg

        go build -o /tmp/httpapi ./cmd/httpapi
        go build -o /tmp/http-worker ./cmd/worker

        /tmp/http-worker &
        worker_pid=$$!
        /tmp/httpapi &
        http_pid=$$!

        trap 'kill -TERM "$$worker_pid" "$$http_pid" 2>/dev/null || true' INT TERM
        wait -n "$$worker_pid" "$$http_pid"
        status=$$?
        kill -TERM "$$worker_pid" "$$http_pid" 2>/dev/null || true
        wait "$$worker_pid" "$$http_pid" 2>/dev/null || true
        exit "$$status"

  frontend:
    image: node:22
    container_name: video-frontend
    working_dir: ${VIDEO_PROJECT_ROOT:-/repo}/hls-web
    profiles:
      - frontend
    volumes:
      - ${VIDEO_PROJECT_ROOT:-.}:${VIDEO_PROJECT_ROOT:-/repo}
      - video_hlsweb_node_modules:${VIDEO_PROJECT_ROOT:-/repo}/hls-web/node_modules
    environment:
      TZ: Asia/Shanghai
      VITE_PROXY_TARGET: http://backend:8083
    ports:
      - "${VIDEO_WEB_PORT:-1325}:1325"
    restart: unless-stopped
    depends_on:
      - backend
    command:
      - "bash"
      - "-c"
      - |
        set -eux

        test -f package.json
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        exec node ./node_modules/vite/bin/vite.js --host 0.0.0.0 --port 1325

volumes:
  video_postgres_data:
  video_redis_data:
  video_minio_data:
  video_gomodcache:
  video_gobuildcache:
  video_hlsweb_node_modules:
  video_gorse_master_data:
  video_gorse_worker_data:
  video_gorse_server_data:
  video_gorse_blob_data:
  video_gorse_log:
