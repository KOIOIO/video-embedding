      file_name:
        type: string
    type: object
  dto.UploadCoverData:
    properties:
      cover_url:
        type: string
      video_id:
        type: integer
    type: object
  dto.UploadCoverResponse:
    properties:
      data:
        $ref: '#/definitions/dto.UploadCoverData'
