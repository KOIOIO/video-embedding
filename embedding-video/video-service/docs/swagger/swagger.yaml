      videos:
        items:
          $ref: '#/definitions/dto.VideoItem'
        type: array
    type: object
  dto.SimilarVideosResponse:
    properties:
      data:
        $ref: '#/definitions/dto.SimilarVideosData'
      success:
        type: boolean
    type: object
  dto.TranscodeStatusData:
    properties:
      hls_url:
        type: string
      status:
        type: string
      task_id:
        type: string
    type: object
  dto.TranscodeStatusResponse:
    properties:
      data:
        $ref: '#/definitions/dto.TranscodeStatusData'
      success:
        type: boolean
    type: object
  dto.UpdateVideoData:
    properties:
      description:
        type: string
      title:
        type: string
      updated:
        type: boolean
      video_id:
        type: integer
    type: object
  dto.UpdateVideoRequest:
    properties:
      description:
        maxLength: 5000
        type: string
      title:
        maxLength: 200
