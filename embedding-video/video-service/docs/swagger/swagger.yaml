        $ref: '#/definitions/dto.ViewCountData'
      success:
        type: boolean
    type: object
  dto.WatchRecordData:
    properties:
      recorded:
        type: boolean
    type: object
  dto.WatchRecordResponse:
    properties:
      data:
        $ref: '#/definitions/dto.WatchRecordData'
      success:
        type: boolean
    type: object
info:
  contact: {}
  description: 提供视频上传、播放、推荐、题目查询等 HTTP 接口。
  title: 衡水平板视频服务接口
  version: "1.0"
paths:
  /api/internal/recommendations/external/recbole:
    get:
      parameters:
      - description: 用户ID
        in: query
        name: user_id
        required: true
        type: integer
      - description: 返回的视频片段ID数量，最多500个
        in: query
        name: "n"
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取 RecBole 召回视频片段ID
      tags:
      - 视频服务
  /api/questions:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.QuestionListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 查询题目列表
      tags:
      - 视频服务
  /api/questions/{id}:
    get:
      parameters:
      - description: 题目ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.QuestionDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 查询题目详情
      tags:
      - 视频服务
  /api/recommendations:
    get:
      parameters:
      - description: 题目ID
        in: query
        name: question_id
        required: true
        type: integer
      - description: 用户ID
        in: query
        name: user_id
        type: integer
      - description: 返回数量
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RecommendationListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 查询推荐列表
      tags:
      - 视频服务
  /api/recommendations/by-question:
    post:
      consumes:
      - application/json
      parameters:
      - description: 推荐请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RecommendByQuestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RecommendationListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 根据题目推荐视频
      tags:
      - 视频服务
  /api/transcode-tasks/{taskId}:
    get:
      parameters:
      - description: 转码任务ID
        in: path
        name: taskId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TranscodeStatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 查询转码任务状态
      tags:
      - 视频服务
  /api/video-segments/{id}/reaction-counts:
    get:
      parameters:
      - description: 视频片段ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SegmentReactionCountsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 查询视频片段点赞和双击数量
      tags:
      - 视频服务
  /api/video-segments/{id}/reactions:
    post:
      consumes:
      - application/json
      parameters:
      - description: 视频片段ID
        in: path
        name: id
        required: true
        type: integer
      - description: 互动参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VideoReactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SegmentReactionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 提交或取消视频片段互动
      tags:
      - 视频服务
  /api/video-segments/random-play:
    get:
      parameters:
      - description: 用户ID，用于个性化推荐和最近播放去重
        in: query
        name: user_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RandomVideoSegmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 随机播放视频片段
      tags:
      - 视频服务
  /api/videos:
    get:
      parameters:
      - default: ALL
        description: 视频类型筛选
        enum:
        - ALL
        - RAW
        - HLS
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.VideoListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 查询视频列表
      tags:
      - 视频服务
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 视频文件
        in: formData
        name: file
        required: true
        type: file
      - description: 视频标题
        in: formData
        name: title
        type: string
      - description: 视频描述
        in: formData
        name: description
        type: string
      - description: 上传用户ID，默认1
        in: formData
        name: user_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UploadVideoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 上传单个视频
      tags:
      - 视频服务
  /api/videos/{id}:
    delete:
      parameters:
      - description: 视频ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DeleteVideoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 删除视频
      tags:
      - 视频服务
    patch:
      consumes:
      - application/json
      parameters:
      - description: 视频ID
        in: path
        name: id
        required: true
        type: integer
      - description: 视频基础信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateVideoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UpdateVideoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 修改视频基础信息
      tags:
      - 视频服务
  /api/videos/{id}/cover:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 视频ID
        in: path
        name: id
        required: true
        type: integer
      - description: 封面文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UploadCoverResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
