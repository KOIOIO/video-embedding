    type: object
  dto.VideoListData:
    properties:
      total:
        type: integer
      type:
        type: string
      videos:
        items:
          $ref: '#/definitions/dto.VideoItem'
        type: array
    type: object
  dto.VideoListResponse:
    properties:
      data:
        $ref: '#/definitions/dto.VideoListData'
      success:
        type: boolean
    type: object
  dto.VideoReactionCountsData:
    properties:
      double_like_count:
        type: integer
      like_count:
        type: integer
      video_id:
        type: integer
    type: object
  dto.VideoReactionCountsResponse:
    properties:
      data:
