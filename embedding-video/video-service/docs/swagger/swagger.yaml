        type: boolean
    type: object
  dto.VideoItem:
    properties:
      cover_url:
        type: string
      created_at_unix:
        type: integer
      description:
        type: string
      hls_url:
        type: string
      is_published:
        type: boolean
      is_recommend:
        type: boolean
      raw_url:
        type: string
      title:
        type: string
      updated_at_unix:
        type: integer
      video_id:
        type: integer
      view_count:
