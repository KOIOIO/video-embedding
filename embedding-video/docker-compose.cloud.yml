services:
  backend_http:
    env_file:
      - ${VIDEO_ENV_FILE:-.env.deploy}
    image: golang:1.26.1-bookworm
    container_name: embedding-video
    working_dir: ${VIDEO_PROJECT_ROOT:-/home/debian/dev-ops/embedding-video}/video-service
    volumes:
      # Keep the project path identical inside the service container and on the host.
      # FFmpeg.UseDocker runs ffmpeg/ffprobe through the host Docker daemon, so
      # docker bind mounts must resolve to the same absolute path on the host.
      - ${VIDEO_PROJECT_ROOT:-/home/debian/dev-ops/embedding-video}:${VIDEO_PROJECT_ROOT:-/home/debian/dev-ops/embedding-video}
      - /tmp/embedding-video:/tmp/embedding-video
      - video_cloud_gomodcache:/go/pkg/mod
      - video_cloud_gobuildcache:/root/.cache/go-build
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    environment:
      TZ: Asia/Shanghai
      GOPROXY: https://goproxy.cn,direct
      CONFIG_FILE: ${VIDEO_PROJECT_ROOT:-/home/debian/dev-ops/embedding-video}/video-service/configs/video_prod.yml
      VIDEO_CONFIG_FILE: ${VIDEO_PROJECT_ROOT:-/home/debian/dev-ops/embedding-video}/video-service/configs/video_prod.yml
      HTTP_ADDR: ${HTTP_ADDR:-0.0.0.0:8083}
      TWO_TOWER_TRAINER_ENABLED: "false"
    command:
      - "bash"
      - "-c"
      - |
        set -eux

        chmod 666 /var/run/docker.sock

        docker image inspect jrottenberg/ffmpeg >/dev/null 2>&1 || docker pull jrottenberg/ffmpeg

        go build -o /tmp/httpapi ./cmd/httpapi
        go build -o /tmp/http-worker ./cmd/worker

        /tmp/http-worker &
        worker_pid=$$!
        /tmp/httpapi &
        http_pid=$$!

        trap 'kill -TERM "$$worker_pid" "$$http_pid" 2>/dev/null || true' INT TERM
        wait -n "$$worker_pid" "$$http_pid"
        status=$$?
        kill -TERM "$$worker_pid" "$$http_pid" 2>/dev/null || true
        wait "$$worker_pid" "$$http_pid" 2>/dev/null || true
        exit "$$status"
    ports:
      - "${VIDEO_HTTP_PORT:-8083}:8083"
    restart: unless-stopped
    healthcheck:
      disable: true

  frontend_web:
    env_file:
      - ${VIDEO_ENV_FILE:-.env.deploy}
    image: node:22
    container_name: embedding-video-web
    working_dir: /app
    volumes:
      - ${VIDEO_PROJECT_ROOT:-/home/debian/dev-ops/embedding-video}/hls-web:/app
      - video_cloud_hlsweb_node_modules:/app/node_modules
    environment:
      TZ: Asia/Shanghai
      VITE_PROXY_TARGET: http://backend_http:8083
    command:
      - "bash"
      - "-c"
      - |
        set -eux

        test -f package.json
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        exec node ./node_modules/vite/bin/vite.js --host 0.0.0.0 --port 1325
    ports:
      - "${VIDEO_WEB_PORT:-1325}:1325"
    depends_on:
      - backend_http
    restart: unless-stopped

volumes:
  video_cloud_gomodcache:
  video_cloud_gobuildcache:
  video_cloud_hlsweb_node_modules:
