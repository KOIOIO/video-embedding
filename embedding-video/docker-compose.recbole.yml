name: embedding-video

x-service-env: &service-env
  TZ: Asia/Shanghai
  CONFIG_FILE: /app/configs/video_prod.yml
  VIDEO_CONFIG_FILE: /app/configs/video_prod.yml

services:
  api:
    build:
      context: .
      dockerfile: video-service/Dockerfile
    image: embedding-video-api:latest
    env_file:
      - ${VIDEO_ENV_FILE:-.env.deploy}
    environment:
      <<: *service-env
      HTTP_ADDR: :8081
      RECBOLE_TRAINER_ENABLED: "false"
    entrypoint: []
    command: ["httpapi"]
    ports:
      - "${VIDEO_HTTP_PORT:-8083}:8081"
    volumes:
      - video_api_logs:/app/logs
      - video_storage:/app/storage
    depends_on:
      gorse:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '>/dev/tcp/127.0.0.1/8081'"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: video-service/Dockerfile
    image: embedding-video-api:latest
    env_file:
      - ${VIDEO_ENV_FILE:-.env.deploy}
    environment:
      <<: *service-env
      RECBOLE_TRAINER_ENABLED: "false"
    entrypoint: []
    command: ["worker"]
    volumes:
      - video_worker_logs:/app/logs
      - video_storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  recbole_trainer:
    build:
      context: .
      dockerfile: recbole-training/Dockerfile.prod
    image: embedding-video-recbole-trainer:latest
    env_file:
      - ${VIDEO_ENV_FILE:-.env.deploy}
    environment:
      TZ: Asia/Shanghai
      CONFIG_FILE: /app/video-service/configs/video_prod.yml
      VIDEO_CONFIG_FILE: /app/video-service/configs/video_prod.yml
      RECBOLE_TRAINER_ENABLED: "true"
    command: ["recboletrainer"]
    volumes:
      - video_recbole_data:/app/recbole-training/data
      - video_recbole_artifacts:/app/recbole-training/artifacts
      - video_recbole_logs:/app/video-service/logs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: hls-web/Dockerfile
    image: embedding-video-frontend:latest
    ports:
      - "${VIDEO_WEB_PORT:-1325}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 5

  gorse:
    image: zhenghaoz/gorse-in-one:${GORSE_VERSION:-latest}
    entrypoint: ["/bin/sh", "/opt/hstv/gorse-entrypoint.sh"]
    env_file:
      - ${VIDEO_ENV_FILE:-.env.deploy}
    volumes:
      - ./gorse/config.toml:/etc/gorse/config.template.toml:ro
      - ./gorse/entrypoint.sh:/opt/hstv/gorse-entrypoint.sh:ro
      - video_gorse_data:/var/lib/gorse
      - video_gorse_log:/var/log/gorse
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  video_api_logs:
  video_worker_logs:
  video_storage:
  video_recbole_data:
  video_recbole_artifacts:
  video_recbole_logs:
  video_gorse_data:
  video_gorse_log:
